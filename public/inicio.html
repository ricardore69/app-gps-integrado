<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio GeoZapp</title>
  <link rel="stylesheet" href="inicio.css" />
</head>

<body>
  <div class="container" style="display: none;">
    <div class="contenido-derecha">
      <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
        <span>Usuario: <span id="nombre-usuario"></span></span>
        <button id="btn-logout"
          style="padding: 5px 10px; cursor: pointer; background-color: #f44336; color: white; border: none; border-radius: 4px;">Cerrar
          Sesión</button>
      </header>

      <main>
        <section class="levantamiento">
          <h2>Levantamiento</h2>

          <!-- Lista desplegable de levantamientos -->
          <select id="selectLevantamientos">
            <option value="">-- Selecciona un levantamiento --</option>
            <option value="nuevo">+ Crear nuevo levantamiento</option>
          </select>

          <!-- Formulario para nuevo levantamiento -->
          <div id="nuevoLevantamientoForm" style="display: none">
            <label for="inputLevantamiento">Nombre:</label>
            <input type="text" id="inputLevantamiento" placeholder="Nombre del levantamiento" />
            <button type="button" id="btnGuardarLevantamiento">
              Guardar
            </button>
          </div>

          <div class="mensaje" id="mensajeLevantamiento"></div>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="inicio.js"></script>
</body>

</html>
